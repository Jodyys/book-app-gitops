apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: book-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: DOCKERUSER/bookapp-backend:5

        ports:
        - containerPort: 5001
