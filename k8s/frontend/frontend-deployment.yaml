apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: book-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: DOCKERUSER/bookapp-frontend:5

        ports:
        - containerPort: 80
